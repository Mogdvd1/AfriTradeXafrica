<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AfriTradeX | Digital Infrastructure for Mineral Trade</title>
    <link rel="icon" type="image/png" href="/logo.png" />
    <meta
      name="description"
      content="AfriTradeX is a digital platform formalizing African mineral trade, enabling ethical sourcing, transparent supply chains, and ESG compliance. Connect miners, buyers, and investors securely."
    />
    <meta
      name="keywords"
      content="African mineral trade, ethical sourcing, transparent supply chains, ESG compliance, African market, AfriTradeX, trace minerals, invest in Africa"
    />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://afritradexafrica.com/" />
    <meta
      property="og:title"
      content="AfriTradeX | Digital Infrastructure for Mineral Trade"
    />
    <meta
      property="og:description"
      content="AfriTradeX is a digital platform formalizing African mineral trade, enabling ethical sourcing, transparent supply chains, and ESG compliance. Connect miners, buyers, and investors securely."
    />
    <!-- Replace with a real image URL when available -->
    <meta property="og:image" content="https://afritradexafrica.com/logo.png" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://afritradexafrica.com/" />
    <meta
      property="twitter:title"
      content="AfriTradeX | Digital Infrastructure for Mineral Trade"
    />
    <meta
      property="twitter:description"
      content="AfriTradeX is a digital platform formalizing African mineral trade, enabling ethical sourcing, transparent supply chains, and ESG compliance. Connect miners, buyers, and investors securely."
    />
    <meta
      property="twitter:image"
      content="https://afritradexafrica.com/logo.png"
    />
  </head>
  <body>
    <div id="root">
      <div
        style="
          display: flex;
          justify-content: center;
          align-items: center;
          height: 100vh;
          color: #f4c430;
          background: #0b0b0b;
          font-family: sans-serif;
          flex-direction: column;
          gap: 20px;
        "
      >
        <div
          style="
            width: 40px;
            height: 40px;
            border: 3px solid #f4c430;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
          "
        ></div>
        <p>Loading AfriTradeX...</p>
        <style>
          @keyframes spin {
            to {
              transform: rotate(360deg);
            }
          }
        </style>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
